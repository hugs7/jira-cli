name: release

# Trigger: pushing a semver tag like v0.1.0 cuts a release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Set up Python (for cloudsmith-cli)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cloudsmith-cli
        run: pip install --upgrade cloudsmith-cli

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # PAT (classic, scopes: repo, workflow) — needed so GoReleaser
          # can push to hugs7/homebrew-tap and hugs7/scoop-bucket.
          GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
